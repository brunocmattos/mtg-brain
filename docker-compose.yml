services:
  db:
    # pgvector/pgvector:pg17 = Postgres 17 + extensao pgvector (busca semantica).
    # Mesmo PG17 do postgres:17, entao o volume mtg_pgdata e compativel.
    image: pgvector/pgvector:pg17
    container_name: mtg-brain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mtg}
      POSTGRES_DB: ${POSTGRES_DB:-mtg}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mtg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtg} -d ${POSTGRES_DB:-mtg}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # API + frontend. Sobe junto com o banco; reinicia sozinho no boot do Docker.
  app:
    build: .
    container_name: mtg-brain-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mtg}:${POSTGRES_PASSWORD:-mtg}@db:5432/${POSTGRES_DB:-mtg}
    ports:
      - "8000:8000"

volumes:
  mtg_pgdata:
